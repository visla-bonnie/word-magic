<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍭 Magic Word Parts House 🍭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #BAE1FF 0%, #BAFFC9 100%);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(90deg, #FFB3BA, #FFFFBA);
        }
        
        .word-part {
            padding: 16px 20px;
            margin: 8px;
            border-radius: 9999px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 6px 6px 0px #E0BBFF;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        
        .word-part:hover {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 8px 8px 0px #FFB3BA;
        }
        
        .tooltip {
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #5D2E8C;
            color: white;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 1rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 100;
            text-align: left;
            min-width: 220px;
        }
        
        .word-part:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
        
        .king-george {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <!-- Header with King George -->
    <div class="header sticky top-0 z-50 px-8 py-5 flex items-center justify-between shadow-xl">
        <div class="flex items-center gap-4">
            <div class="king-george text-6xl">🦫👑</div>
            <div>
                <h1 class="text-4xl font-bold text-[#5D2E8C]">Magic Word Parts House</h1>
                <p class="text-[#5D2E8C]/80 text-lg">with King George the Beaver 👑</p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div onclick="showRewards()" class="flex items-center bg-white rounded-full px-6 py-3 cursor-pointer hover:scale-110 transition">
                <span class="text-4xl">⭐</span>
                <span id="star-count" class="font-bold text-3xl ml-3 text-[#FFB3BA]">0</span>
            </div>
            
            <div class="flex bg-white rounded-full p-1 shadow">
                <button onclick="navigate(0)" id="nav-0" class="nav-btn px-6 py-3 rounded-full font-bold text-lg">🏠 Home</button>
                <button onclick="navigate(1)" id="nav-1" class="nav-btn px-6 py-3 rounded-full font-bold text-lg">📚 Learn</button>
                <button onclick="navigate(2)" id="nav-2" class="nav-btn px-6 py-3 rounded-full font-bold text-lg">🎲 Mix & Match</button>
                <button onclick="navigate(3)" id="nav-3" class="nav-btn px-6 py-3 rounded-full font-bold text-lg">🧠 Quiz</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 pt-12">
        
        <!-- Home Screen -->
        <div id="screen-0">
            <div class="text-center py-16">
                <div class="text-8xl mb-8 king-george">🦫👑🍭</div>
                <h1 class="text-6xl font-bold text-[#5D2E8C] mb-4">Welcome to Magic Word Parts House!</h1>
                <p class="text-3xl text-[#5D2E8C]/70">Learn with King George the Beaver 🦫</p>
                <p class="text-2xl mt-6">Prefixes • Roots • Suffixes in a fun way!</p>
                
                <div class="grid grid-cols-3 gap-8 mt-20 max-w-4xl mx-auto">
                    <div onclick="navigate(1)" class="card bg-[#BAE1FF] p-12 rounded-3xl text-center cursor-pointer hover:scale-105">
                        <div class="text-8xl mb-6">🔵</div>
                        <h3 class="text-4xl font-bold">Prefixes</h3>
                    </div>
                    <div onclick="navigate(1)" class="card bg-[#BAFFC9] p-12 rounded-3xl text-center cursor-pointer hover:scale-105">
                        <div class="text-8xl mb-6">🟢</div>
                        <h3 class="text-4xl font-bold">Roots</h3>
                    </div>
                    <div onclick="navigate(1)" class="card bg-[#FFB3BA] p-12 rounded-3xl text-center cursor-pointer hover:scale-105">
                        <div class="text-8xl mb-6">🔴</div>
                        <h3 class="text-4xl font-bold">Suffixes</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Learn Screen - with hover tooltips -->
        <div id="screen-1" class="hidden">
            <h2 class="text-5xl font-bold text-center mb-12 text-[#5D2E8C]">Colorful Word Parts with King George 🦫</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <!-- Prefixes -->
                <div>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="text-5xl">🔵</div>
                        <h3 class="text-4xl font-bold text-[#5D2E8C]">Prefixes</h3>
                    </div>
                    <div id="prefix-list" class="flex flex-wrap"></div>
                </div>
                
                <!-- Roots -->
                <div>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="text-5xl">🟢</div>
                        <h3 class="text-4xl font-bold text-[#5D2E8C]">Roots</h3>
                    </div>
                    <div id="root-list" class="flex flex-wrap"></div>
                </div>
                
                <!-- Suffixes -->
                <div>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="text-5xl">🔴</div>
                        <h3 class="text-4xl font-bold text-[#5D2E8C]">Suffixes</h3>
                    </div>
                    <div id="suffix-list" class="flex flex-wrap"></div>
                </div>
            </div>
        </div>

        <!-- Mix & Match and Quiz screens are kept the same as before (I can add them if needed) -->
    </div>

    <script>
        // Data with cute examples for kids
        const prefixes = [
            {part: "anti-", meaning: "against", examples: ["antibiotic", "antifreeze", "antidote"]},
            {part: "auto-", meaning: "self", examples: ["autograph", "automatic", "autopilot"]},
            {part: "bi-", meaning: "two", examples: ["bicycle", "bilingual", "binoculars"]},
            {part: "circum-", meaning: "around", examples: ["circumference", "circumnavigate"]},
            {part: "co-", meaning: "together", examples: ["cooperate", "coauthor"]},
            {part: "dis-", meaning: "not, apart", examples: ["disappear", "dislike", "disconnect"]},
            {part: "pre-", meaning: "before", examples: ["preview", "predict", "preheat"]},
            {part: "re-", meaning: "again", examples: ["redo", "rewrite", "replay"]},
            {part: "sub-", meaning: "under", examples: ["submarine", "subway", "subtitle"]},
            {part: "super-", meaning: "above", examples: ["superhero", "supermarket"]}
        ];

        const roots = [
            {part: "bio", meaning: "life", examples: ["biology", "biography", "biologist"]},
            {part: "chron", meaning: "time", examples: ["chronology", "chronicle", "synchronize"]},
            {part: "geo", meaning: "earth", examples: ["geography", "geology", "geometry"]},
            {part: "graph", meaning: "write", examples: ["autograph", "photograph", "telegraph"]},
            {part: "hydr", meaning: "water", examples: ["hydrate", "hydroplane", "dehydrate"]},
            {part: "logy", meaning: "study of", examples: ["biology", "zoology", "psychology"]},
            {part: "photo", meaning: "light", examples: ["photograph", "photosynthesis"]},
            {part: "scope", meaning: "see", examples: ["telescope", "microscope", "kaleidoscope"]},
            {part: "tele", meaning: "far", examples: ["television", "telephone", "telescope"]}
        ];

        const suffixes = [
            {part: "-able", meaning: "can be", examples: ["readable", "lovable", "breakable"]},
            {part: "-ful", meaning: "full of", examples: ["beautiful", "colorful", "helpful"]},
            {part: "-less", meaning: "without", examples: ["hopeless", "fearless", "careless"]},
            {part: "-ology", meaning: "study of", examples: ["biology", "zoology"]},
            {part: "-phobia", meaning: "fear of", examples: ["arachnophobia", "claustrophobia"]},
            {part: "-ist", meaning: "person who", examples: ["artist", "scientist", "dentist"]}
        ];

        function createWordPart(item, colorClass) {
            const div = document.createElement('div');
            div.className = `word-part ${colorClass} inline-flex items-center`;
            div.innerHTML = `
                ${item.part} <span class="ml-2 text-sm opacity-80">(${item.meaning})</span>
                <div class="tooltip">
                    <strong>Examples:</strong><br>
                    ${item.examples.map(ex => `• ${ex}`).join('<br>')}
                </div>
            `;
            return div;
        }

        function loadLearnPage() {
            const pList = document.getElementById('prefix-list');
            prefixes.forEach(item => pList.appendChild(createWordPart(item, 'bg-[#BAE1FF] text-[#1E40AF]')));

            const rList = document.getElementById('root-list');
            roots.forEach(item => rList.appendChild(createWordPart(item, 'bg-[#BAFFC9] text-[#166534]')));

            const sList = document.getElementById('suffix-list');
            suffixes.forEach(item => sList.appendChild(createWordPart(item, 'bg-[#FFB3BA] text-[#9F1239]')));
        }

        // Simple navigation and stars (same as before)
        function navigate(screen) {
            document.querySelectorAll('#screen-0, #screen-1').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-' + screen).classList.remove('hidden');
        }

        let totalStars = 0;
        function loadStars() {
            totalStars = parseInt(localStorage.getItem('magicStars')) || 0;
            document.getElementById('star-count').textContent = totalStars;
        }
        function addStars(num) {
            totalStars += num;
            localStorage.setItem('magicStars', totalStars);
            document.getElementById('star-count').textContent = totalStars;
        }
        function showRewards() {
            alert("🎉 You have " + totalStars + " stars! Keep learning with King George! 🦫");
        }

        // Launch colorful confetti when correct
        function launchConfetti() {
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    console.log("✨ Confetti!");
                }, i * 10);
            }
        }

        window.onload = () => {
            loadLearnPage();
            loadStars();
            navigate(0);
        };
    </script>
</body>
</html>
