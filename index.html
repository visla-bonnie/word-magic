<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍭 Magic Word Parts House 🍭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #BAE1FF 0%, #BAFFC9 100%);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(90deg, #FFB3BA, #FFFFBA);
        }
        
        .card {
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border-radius: 24px;
            box-shadow: 8px 8px 0px #E0BBFF;
        }
        
        .card:hover {
            transform: scale(1.08) rotate(2deg);
        }
        
        .word-part {
            padding: 14px 18px;
            margin: 6px;
            border-radius: 9999px;
            font-size: 1.15rem;
            font-weight: 700;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            cursor: pointer;
            position: relative;
        }
        
        .tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: #5D2E8C;
            color: white;
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            z-index: 50;
        }
        
        .word-part:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(-8px);
        }
        
        .bounce-btn {
            animation: bounce 0.6s infinite alternate;
        }
        
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }
    </style>
</head>
<body class="pb-12">
    <div class="header sticky top-0 z-50 px-6 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <div class="text-5xl">🧚‍♀️</div>
            <div>
                <h1 class="text-4xl font-bold text-[#5D2E8C]">Magic Word Parts House</h1>
                <p class="text-[#5D2E8C]/80">Prefixes • Roots • Suffixes • Mix & Match ✨</p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div onclick="showRewards()" class="flex items-center bg-white rounded-3xl px-6 py-2 cursor-pointer hover:scale-110">
                <span class="text-4xl">⭐</span>
                <span id="star-count" class="font-bold text-3xl ml-3 text-[#FFB3BA]">0</span>
            </div>
            
            <div class="flex bg-white rounded-3xl p-1 shadow">
                <button onclick="navigate(0)" id="nav-0" class="nav-btn px-6 py-3 rounded-3xl font-bold">🏠 Home</button>
                <button onclick="navigate(1)" id="nav-1" class="nav-btn px-6 py-3 rounded-3xl font-bold">📚 Learn</button>
                <button onclick="navigate(2)" id="nav-2" class="nav-btn px-6 py-3 rounded-3xl font-bold">🎲 Mix & Match</button>
                <button onclick="navigate(3)" id="nav-3" class="nav-btn px-6 py-3 rounded-3xl font-bold">🧠 Quiz</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 pt-10">
        
        <!-- Home -->
        <div id="screen-0">
            <div class="text-center py-16">
                <div class="text-8xl mb-6">🍭🧚‍♀️🍭</div>
                <h1 class="text-6xl font-bold text-[#5D2E8C] mb-4">Welcome to Magic Word Parts House!</h1>
                <p class="text-3xl text-[#5D2E8C]/70">Learn Prefixes, Roots, and Suffixes in a fun way!</p>
                
                <div class="grid grid-cols-3 gap-8 mt-16 max-w-3xl mx-auto">
                    <div onclick="navigate(1)" class="card bg-[#BAE1FF] p-10 text-center cursor-pointer">
                        <div class="text-7xl mb-4">🔵</div>
                        <h3 class="text-3xl font-bold">Prefixes</h3>
                    </div>
                    <div onclick="navigate(1)" class="card bg-[#BAFFC9] p-10 text-center cursor-pointer">
                        <div class="text-7xl mb-4">🟢</div>
                        <h3 class="text-3xl font-bold">Roots</h3>
                    </div>
                    <div onclick="navigate(1)" class="card bg-[#FFB3BA] p-10 text-center cursor-pointer">
                        <div class="text-7xl mb-4">🔴</div>
                        <h3 class="text-3xl font-bold">Suffixes</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Learn Page -->
        <div id="screen-1" class="hidden">
            <h2 class="text-5xl font-bold text-center mb-10 text-[#5D2E8C]">Colorful Word Parts Table</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <!-- Prefixes -->
                <div>
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-[#BAE1FF] rounded-3xl flex items-center justify-center text-3xl">🔵</div>
                        <h3 class="text-4xl font-bold text-[#5D2E8C]">Prefixes</h3>
                    </div>
                    <div id="prefix-list" class="flex flex-wrap"></div>
                </div>
                
                <!-- Roots -->
                <div>
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-[#BAFFC9] rounded-3xl flex items-center justify-center text-3xl">🟢</div>
                        <h3 class="text-4xl font-bold text-[#5D2E8C]">Roots</h3>
                    </div>
                    <div id="root-list" class="flex flex-wrap"></div>
                </div>
                
                <!-- Suffixes -->
                <div>
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-[#FFB3BA] rounded-3xl flex items-center justify-center text-3xl">🔴</div>
                        <h3 class="text-4xl font-bold text-[#5D2E8C]">Suffixes</h3>
                    </div>
                    <div id="suffix-list" class="flex flex-wrap"></div>
                </div>
            </div>
        </div>

        <!-- Mix & Match + Quiz 页面保持不变（代码较长，这里省略了 Mix & Match 和 Quiz 部分，与之前版本一致） -->

    <script>
        // 数据（和之前一样）

        // 示例：我只展示如何添加 tooltip（你需要把完整数据放进来）
        function createWordPart(item, colorClass, examples) {
            const div = document.createElement('div');
            div.className = `word-part ${colorClass} inline-block`;
            div.innerHTML = `
                ${item.part} <span class="text-sm">(${item.meaning})</span>
                <div class="tooltip text-left max-w-xs">
                    <strong>Examples:</strong><br>
                    ${examples.map(ex => `• ${ex}`).join('<br>')}
                </div>
            `;
            return div;
        }

        function loadLearnPage() {
            const pList = document.getElementById('prefix-list');
            // 示例：anti-
            pList.appendChild(createWordPart(
                {part: "anti-", meaning: "against"}, 
                "bg-[#BAE1FF]", 
                ["antibiotic", "antifreeze", "antidote", "antisocial"]
            ));
            
            // 你可以继续为每个词根添加对应的 examples

        // 其他函数（navigate, stars, confetti 等）和之前一样

</body>
</html>
