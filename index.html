<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍭 Magic Word Parts House 🍭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #BAE1FF 0%, #BAFFC9 100%);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(90deg, #FFB3BA, #FFFFBA);
        }
        
        .king-george {
            animation: floatAndSpin 4s ease-in-out infinite;
            display: inline-block;
        }
        
        @keyframes floatAndSpin {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-22px) rotate(6deg); }
        }
        
        .word-part {
            padding: 16px 22px;
            margin: 8px;
            border-radius: 9999px;
            font-size: 1.18rem;
            font-weight: 700;
            box-shadow: 6px 6px 0px #E0BBFF;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        
        .word-part:hover {
            transform: scale(1.08) rotate(4deg);
            box-shadow: 10px 10px 0px #FFB3BA;
        }
        
        .tooltip {
            position: absolute;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            background: #5D2E8C;
            color: white;
            padding: 18px 24px;
            border-radius: 22px;
            font-size: 1.02rem;
            line-height: 1.5;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            z-index: 100;
            min-width: 280px;
            text-align: left;
            max-width: 320px;
        }
        
        .word-part:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(-18px);
        }
    </style>
</head>
<body>
    <div class="header sticky top-0 z-50 px-8 py-5 flex items-center justify-between shadow-2xl">
        <div class="flex items-center gap-5">
            <div class="king-george text-6xl">🦫👑</div>
            <div>
                <h1 class="text-4xl font-bold text-[#5D2E8C]">Magic Word Parts House</h1>
                <p class="text-[#5D2E8C]/80 text-xl">with King George the Beaver 🦫👑</p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div onclick="showRewards()" class="flex items-center bg-white rounded-full px-7 py-3 cursor-pointer hover:scale-110 transition">
                <span class="text-4xl">⭐</span>
                <span id="star-count" class="font-bold text-3xl ml-3 text-[#FFB3BA]">0</span>
            </div>
            
            <div class="flex bg-white rounded-full p-1 shadow-inner">
                <button onclick="navigate(0)" id="nav-0" class="nav-btn px-6 py-3 rounded-full font-bold text-lg">🏠 Home</button>
                <button onclick="navigate(1)" id="nav-1" class="nav-btn px-6 py-3 rounded-full font-bold text-lg">📚 Learn</button>
                <button onclick="navigate(2)" id="nav-2" class="nav-btn px-6 py-3 rounded-full font-bold text-lg">🎲 Mix & Match</button>
                <button onclick="navigate(3)" id="nav-3" class="nav-btn px-6 py-3 rounded-full font-bold text-lg">🧠 Quiz</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-8 pt-12">
        
        <!-- Home -->
        <div id="screen-0" class="text-center py-20">
            <div class="king-george text-9xl mb-8">🦫👑🍭</div>
            <h1 class="text-6xl font-bold text-[#5D2E8C] mb-4">Welcome to Magic Word Parts House!</h1>
            <p class="text-3xl text-[#5D2E8C]/70">Learn with King George the Beaver 🦫</p>
        </div>

        <!-- Learn Screen -->
        <div id="screen-1" class="hidden">
            <div class="flex justify-center items-center gap-6 mb-12">
                <h2 class="text-5xl font-bold text-[#5D2E8C]">Colorful Word Parts with King George</h2>
                <div class="king-george text-7xl">🦫👑</div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <!-- Prefixes -->
                <div>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-12 h-12 bg-[#BAE1FF] rounded-full flex items-center justify-center text-4xl">🔵</div>
                        <h3 class="text-4xl font-bold text-[#5D2E8C]">Prefixes</h3>
                    </div>
                    <div id="prefix-list" class="flex flex-wrap"></div>
                </div>
                
                <!-- Roots -->
                <div>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-12 h-12 bg-[#BAFFC9] rounded-full flex items-center justify-center text-4xl">🟢</div>
                        <h3 class="text-4xl font-bold text-[#5D2E8C]">Roots</h3>
                    </div>
                    <div id="root-list" class="flex flex-wrap"></div>
                </div>
                
                <!-- Suffixes -->
                <div>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-12 h-12 bg-[#FFB3BA] rounded-full flex items-center justify-center text-4xl">🔴</div>
                        <h3 class="text-4xl font-bold text-[#5D2E8C]">Suffixes</h3>
                    </div>
                    <div id="suffix-list" class="flex flex-wrap"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Full data with many more examples for 6th grade / ERB level
        const prefixes = [
            {part: "anti-", meaning: "against", examples: ["antibiotic", "antidote", "antifreeze", "antisocial", "antiperspirant", "antithesis", "antonym", "antacid", "antivirus", "antibacterial"]},
            {part: "auto-", meaning: "self", examples: ["autograph", "automatic", "autopilot", "autobiography", "automobile", "autonomous"]},
            {part: "bi-", meaning: "two", examples: ["bicycle", "bilingual", "binoculars", "bipartisan", "bisect"]},
            {part: "circum-", meaning: "around", examples: ["circumference", "circumnavigate", "circumspect"]},
            {part: "co-", meaning: "together", examples: ["cooperate", "coauthor", "coexist", "coordinate"]},
            {part: "de-", meaning: "down, away", examples: ["descend", "depart", "destroy", "dehydrate"]},
            {part: "dis-", meaning: "not, apart", examples: ["disappear", "dislike", "disconnect", "disagree", "discover"]},
            {part: "ex-", meaning: "out of", examples: ["exit", "export", "explode", "extract"]},
            {part: "extra-", meaning: "beyond", examples: ["extraordinary", "extraterrestrial", "extracurricular"]},
            {part: "hyper-", meaning: "over, excessive", examples: ["hyperactive", "hypersensitive", "hyperbole"]},
            {part: "hypo-", meaning: "under", examples: ["hypoallergenic", "hypodermic", "hypothesis"]},
            {part: "in-", meaning: "not, in", examples: ["invisible", "incorrect", "inside", "incomplete"]},
            {part: "inter-", meaning: "between", examples: ["international", "interact", "interrupt"]},
            {part: "intra-", meaning: "within", examples: ["intravenous", "intramural"]},
            {part: "macro-", meaning: "large", examples: ["macroeconomics", "macroscopic"]},
            {part: "micro-", meaning: "small", examples: ["microscope", "microbiology", "microphone"]},
            {part: "mono-", meaning: "one", examples: ["monologue", "monotone", "monopoly"]},
            {part: "multi-", meaning: "many", examples: ["multicolor", "multimedia", "multitask"]},
            {part: "neo-", meaning: "new", examples: ["neonatal", "neoclassical"]},
            {part: "non-", meaning: "not", examples: ["nonstop", "nonfiction", "nonsense"]},
            {part: "omni-", meaning: "all", examples: ["omnivore", "omnipotent"]},
            {part: "pan-", meaning: "all", examples: ["panorama", "pandemic"]},
            {part: "peri-", meaning: "around", examples: ["perimeter", "periscope"]},
            {part: "poly-", meaning: "many", examples: ["polygon", "polyglot", "polysyllabic"]},
            {part: "post-", meaning: "after", examples: ["postpone", "postscript", "postwar"]},
            {part: "pre-", meaning: "before", examples: ["preview", "predict", "preheat", "prehistoric"]},
            {part: "re-", meaning: "again", examples: ["redo", "rewrite", "replay", "review", "rebuild"]},
            {part: "sub-", meaning: "under", examples: ["submarine", "subtitle", "subway", "submerge"]},
            {part: "super-", meaning: "above", examples: ["superhero", "supermarket", "supersonic"]},
            {part: "trans-", meaning: "across", examples: ["transport", "translate", "transatlantic"]}
        ];

        const roots = [
            {part: "bio", meaning: "life", examples: ["biology", "biography", "biologist", "antibiotic", "biosphere", "biodegradable", "symbiosis", "amphibian"]},
            {part: "chron", meaning: "time", examples: ["chronology", "chronicle", "synchronize", "anachronism"]},
            {part: "dict", meaning: "say", examples: ["predict", "dictionary", "contradict", "verdict"]},
            {part: "form", meaning: "shape", examples: ["transform", "uniform", "reform", "deform"]},
            {part: "geo", meaning: "earth", examples: ["geography", "geology", "geometry", "geothermal"]},
            {part: "graph", meaning: "write", examples: ["autograph", "photograph", "biography", "telegraph", "bibliography", "calligraphy"]},
            {part: "hydr", meaning: "water", examples: ["hydrate", "hydroplane", "dehydrate", "hydraulic"]},
            {part: "ject", meaning: "throw", examples: ["project", "reject", "eject", "inject"]},
            {part: "logy", meaning: "study", examples: ["biology", "psychology", "zoology", "geology"]},
            {part: "lumin", meaning: "light", examples: ["illuminate", "luminous"]},
            {part: "magn", meaning: "big", examples: ["magnificent", "magnify"]},
            {part: "meter", meaning: "measure", examples: ["thermometer", "diameter", "speedometer"]},
            {part: "morph", meaning: "shape", examples: ["metamorphosis", "amorphous"]},
            {part: "path", meaning: "feeling", examples: ["sympathy", "empathy", "apathetic"]},
            {part: "phon", meaning: "sound", examples: ["telephone", "symphony", "microphone"]},
            {part: "photo", meaning: "light", examples: ["photograph", "photosynthesis", "photocopy"]},
            {part: "port", meaning: "carry", examples: ["transport", "export", "import", "portable"]},
            {part: "scope", meaning: "see", examples: ["telescope", "microscope", "kaleidoscope", "periscope"]},
            {part: "scrib/script", meaning: "write", examples: ["describe", "manuscript", "prescribe", "subscribe"]},
            {part: "spect", meaning: "look", examples: ["inspect", "spectator", "perspective", "introspect"]},
            {part: "struct", meaning: "build", examples: ["construct", "structure", "destroy", "instruct"]},
            {part: "tele", meaning: "far", examples: ["television", "telephone", "telescope", "telepathic"]},
            {part: "therm", meaning: "heat", examples: ["thermometer", "thermal", "thermostat"]},
            {part: "tract", meaning: "pull", examples: ["tractor", "attract", "contract", "extract"]},
            {part: "vac", meaning: "empty", examples: ["vacuum", "vacant", "evacuate"]},
            {part: "vent", meaning: "come", examples: ["prevent", "adventure", "invent"]},
            {part: "vid/vis", meaning: "see", examples: ["video", "vision", "visible", "television"]},
            {part: "voc", meaning: "voice", examples: ["vocal", "vocabulary", "advocate"]},
            {part: "zo", meaning: "animal", examples: ["zoo", "zoology", "zodiac"]},
            {part: "ped", meaning: "foot", examples: ["pedal", "pedestrian", "centipede"]}
        ];

        const suffixes = [
            {part: "-able", meaning: "can be", examples: ["readable", "lovable", "breakable", "comfortable", "believable"]},
            {part: "-acy", meaning: "state", examples: ["democracy", "accuracy"]},
            {part: "-al", meaning: "related to", examples: ["personal", "natural", "musical"]},
            {part: "-ance", meaning: "quality", examples: ["importance", "performance"]},
            {part: "-ant", meaning: "one who", examples: ["assistant", "participant"]},
            {part: "-arium", meaning: "place for", examples: ["aquarium", "planetarium"]},
            {part: "-ation", meaning: "process", examples: ["information", "celebration", "imagination"]},
            {part: "-dom", meaning: "state of being", examples: ["freedom", "kingdom"]},
            {part: "-er", meaning: "one who", examples: ["teacher", "writer", "runner"]},
            {part: "-esque", meaning: "like", examples: ["picturesque", "statuesque"]},
            {part: "-ful", meaning: "full of", examples: ["beautiful", "colorful", "helpful", "powerful", "careful"]},
            {part: "-hood", meaning: "state", examples: ["childhood", "neighborhood"]},
            {part: "-ible", meaning: "capable of", examples: ["visible", "flexible", "responsible"]},
            {part: "-ify", meaning: "make", examples: ["simplify", "beautify", "clarify"]},
            {part: "-ion", meaning: "act", examples: ["action", "decision", "creation"]},
            {part: "-ish", meaning: "like", examples: ["childish", "selfish"]},
            {part: "-ism", meaning: "belief", examples: ["optimism", "patriotism"]},
            {part: "-ist", meaning: "person", examples: ["artist", "scientist", "dentist", "biologist"]},
            {part: "-ity", meaning: "state", examples: ["activity", "creativity", "reality"]},
            {part: "-less", meaning: "without", examples: ["fearless", "hopeless", "careless", "endless", "harmless"]},
            {part: "-logist", meaning: "specialist", examples: ["biologist", "geologist", "psychologist"]},
            {part: "-ment", meaning: "result", examples: ["enjoyment", "development", "government"]},
            {part: "-ness", meaning: "state", examples: ["happiness", "kindness", "darkness"]},
            {part: "-oid", meaning: "resembling", examples: ["humanoid", "asteroid"]},
            {part: "-ology", meaning: "study of", examples: ["biology", "zoology", "psychology", "geology"]},
            {part: "-ous", meaning: "full of", examples: ["famous", "dangerous", "adventurous"]},
            {part: "-phile", meaning: "lover of", examples: ["bibliophile", "anglophile"]},
            {part: "-phobia", meaning: "fear of", examples: ["arachnophobia", "claustrophobia", "hydrophobia"]},
            {part: "-y", meaning: "characterized by", examples: ["cloudy", "rainy", "sleepy"]}
        ];

        function createWordPart(item, colorClass) {
            const div = document.createElement('div');
            div.className = `word-part ${colorClass}`;
            div.innerHTML = `
                ${item.part} <span class="text-sm opacity-75">(${item.meaning})</span>
                <div class="tooltip">
                    <strong>Examples:</strong><br>
                    ${item.examples.map(ex => `• ${ex}`).join('<br>')}
                </div>
            `;
            return div;
        }

        function loadLearnPage() {
            const pList = document.getElementById('prefix-list');
            prefixes.forEach(item => pList.appendChild(createWordPart(item, 'bg-[#BAE1FF] text-[#1E40AF]')));

            const rList = document.getElementById('root-list');
            roots.forEach(item => rList.appendChild(createWordPart(item, 'bg-[#BAFFC9] text-[#166534]')));

            const sList = document.getElementById('suffix-list');
            suffixes.forEach(item => sList.appendChild(createWordPart(item, 'bg-[#FFB3BA] text-[#9F1239]')));
        }

        function navigate(screen) {
            document.querySelectorAll('#screen-0, #screen-1').forEach(el => el.classList.add('hidden'));
            document.getElementById('screen-' + screen).classList.remove('hidden');
        }

        let totalStars = 0;
        function loadStars() {
            totalStars = parseInt(localStorage.getItem('magicStars')) || 0;
            document.getElementById('star-count').textContent = totalStars;
        }
        function showRewards() {
            alert(`🎉 You have ${totalStars} stars!\nKeep practicing with King George the Beaver! 🦫👑`);
        }

        window.onload = () => {
            loadLearnPage();
            loadStars();
            navigate(0);
        };
    </script>
</body>
</html>
